global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: router
    static_configs:
      - targets: ["router:8001"]
    metrics_path: /metrics

  - job_name: vision
    static_configs:
      - targets: ["vision:8002"]
    metrics_path: /metrics

  - job_name: knowledge
    static_configs:
      - targets: ["knowledge:8003"]
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:8000"]
    metrics_path: /metrics
