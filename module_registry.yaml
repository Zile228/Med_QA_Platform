# Module Registry - each entry = 1 service
# The orchestrator reads this file to know which service to call for which modality

version: "1.0"

services:
  router:
    url: "http://router:8001"
    endpoint: "/route"
    description: "Modality classifier (EfficientNet-B0)"

  vision:
    url: "http://vision:8002"
    modalities:
      us_breast:
        endpoint: "/analyze/us_breast"
        description: "Breast US - EfficientNet-B4 segment + MTL classify"
      us_thyroid:
        endpoint: "/analyze/us_thyroid"
        description: "Thyroid US - EfficientNet-B4 segment + TI-RADS features"
      xray:
        endpoint: "/analyze/xray"
        description: "X-Ray - Phase 2 (not implemented)"
        enabled: false

  knowledge:
    url: "http://knowledge:8003"
    endpoint: "/map"
    description: "Severity mapping + spatial feature derivation"

  orchestrator:
    url: "http://orchestrator:8000"
    endpoint: "/analyze"
    description: "LangGraph gateway - coordinates all services"
